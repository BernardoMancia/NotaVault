<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NotaVault - Cofre Digital de Notas e Recibos. Gerencie suas notas fiscais com segurança e inteligência artificial.">
  <meta name="theme-color" content="#0a0a0f">
  <title>NotaVault - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%2333ddff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M14 17l-3-3-1.5 1.5L14 20l7-7-1.5-1.5L14 17z' fill='%230a0a0f'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(255,255,255,0.03);
      --bg-card-hover: rgba(255,255,255,0.06);
      --border-color: rgba(255,255,255,0.05);
      --border-hover: rgba(255,255,255,0.1);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #00d4ff;
      --accent-green: #00ff88;
      --accent-red: #ff3366;
      --glow-cyan: 0 0 20px rgba(0,212,255,0.3);
      --radius: 12px;
      --radius-lg: 16px;
      --radius-sm: 8px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    a { color: var(--accent-cyan); text-decoration: none; transition: var(--transition); }
    a:hover { color: #33ddff; text-shadow: var(--glow-cyan); }
    input, button { font-family: inherit; font-size: inherit; outline: none; border: none; background: none; color: inherit; }
    button { cursor: pointer; }
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-layout::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }
    .auth-layout::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,0.08), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100px); } }
    @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }
    .auth-card {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.2), transparent);
    }
    .auth-brand { text-align: center; margin-bottom: 2rem; }
    .auth-brand-icon { width: 56px; height: 56px; margin: 0 auto 1rem; }
    .auth-brand-icon svg { width: 56px; height: 56px; filter: drop-shadow(0 0 12px rgba(0,212,255,0.4)); }
    .auth-brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), #33ddff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.35rem;
    }
    .auth-brand-subtitle { font-size: 0.85rem; color: var(--text-muted); }
    .input-group { position: relative; margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), var(--glow-cyan);
      background: rgba(255,255,255,0.05);
    }
    .input-with-icon { position: relative; }
    .input-with-icon .form-input { padding-right: 2.5rem; }
    .input-with-icon .input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: var(--transition);
    }
    .input-with-icon .input-icon:hover { color: var(--text-primary); }
    .input-with-icon .input-icon svg { width: 18px; height: 18px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.875rem;
      letter-spacing: 0.025em;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 18px; height: 18px; }
    .btn-primary {
      background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.1));
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent-cyan);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0,212,255,0.3), rgba(0,212,255,0.15));
      box-shadow: var(--glow-cyan);
      border-color: rgba(0,212,255,0.5);
    }
    .w-full { width: 100%; }
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .text-secondary { color: var(--text-secondary); }
    .text-sm { font-size: 0.8rem; }
    .text-mono { font-family: 'JetBrains Mono', monospace; }
    .mb-2 { margin-bottom: 0.75rem; }
    .mb-3 { margin-bottom: 1rem; }
    .mt-2 { margin-top: 0.75rem; }
    .mfa-code-input {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1.5rem 0;
    }
    .mfa-code-input input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      color: var(--accent-cyan);
      transition: var(--transition);
    }
    .mfa-code-input input:focus {
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), var(--glow-cyan);
      background: rgba(255,255,255,0.05);
    }
    .auth-form-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      font-size: 0.875rem;
      min-width: 320px;
      max-width: 440px;
      animation: slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .toast::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: currentColor;
      animation: toastProgress 5s linear forwards;
    }
    .toast-success { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.2); color: var(--accent-green); }
    .toast-error { background: rgba(255,51,102,0.08); border-color: rgba(255,51,102,0.2); color: var(--accent-red); }
    .toast-info { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.2); color: var(--accent-cyan); }
    .toast.removing { animation: slideOutRight 0.3s forwards; }
    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem; margin: 0 0.5rem; }
      .mfa-code-input input { width: 40px; height: 48px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="shield-grad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#33ddff"/>
              </linearGradient>
              <linearGradient id="shield-inner" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#33ddff" stop-opacity="0.1"/>
              </linearGradient>
            </defs>
            <path d="M28 4L8 14v12c0 12.6 8.5 24.3 20 28 11.5-3.7 20-15.4 20-28V14L28 4z" fill="url(#shield-inner)" stroke="url(#shield-grad)" stroke-width="1.5"/>
            <path d="M28 12L14 18v8c0 8.4 5.6 16.2 14 18.6 8.4-2.4 14-10.2 14-18.6v-8L28 12z" fill="url(#shield-inner)" stroke="url(#shield-grad)" stroke-width="0.8" opacity="0.6"/>
            <path d="M24 30l-6-6 2.5-2.5L24 25l11.5-11.5L38 16 24 30z" fill="url(#shield-grad)"/>
          </svg>
        </div>
        <h1 class="auth-brand-title">NotaVault</h1>
        <p class="auth-brand-subtitle">Cofre Digital de Notas e Recibos</p>
      </div>

      <form id="login-form" method="POST" action="javascript:void(0)" autocomplete="on">
        <div class="input-group">
          <label class="form-label" for="username">Usuário</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="Digite seu usuário" autocomplete="username" required>
        </div>

        <div class="input-group">
          <label class="form-label" for="password">Senha</label>
          <div class="input-with-icon">
            <input type="password" id="password" name="password" class="form-input" placeholder="Digite sua senha" autocomplete="current-password" required>
            <span class="input-icon" id="toggle-password" role="button" tabindex="0" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="login-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Entrar
        </button>
      </form>

      <div id="mfa-step" class="hidden">
        <div class="text-center mb-3">
          <h3 style="font-size:1rem;margin-bottom:0.5rem;">Verificação em Duas Etapas</h3>
          <p class="text-secondary text-sm">Digite o código de 6 dígitos do seu aplicativo autenticador</p>
        </div>

        <div class="mfa-code-input" id="mfa-inputs">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" data-index="0">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="1">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="2">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="3">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="4">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-index="5">
        </div>

        <button type="button" class="btn btn-primary w-full mb-2" id="mfa-verify-btn">
          Verificar
        </button>

        <div class="text-center mt-2">
          <a href="#" id="use-backup-code" class="text-sm">Usar código de backup</a>
        </div>

        <div id="backup-code-input" class="hidden mt-2">
          <div class="input-group">
            <label class="form-label" for="backup-code">Código de Backup</label>
            <input type="text" id="backup-code" class="form-input text-mono" placeholder="XXXXXXXX">
          </div>
          <button type="button" class="btn btn-primary w-full" id="backup-verify-btn">
            Verificar Backup
          </button>
        </div>
      </div>

      <div class="auth-form-footer">
        <a href="/register.html">Solicitar Cadastro</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
