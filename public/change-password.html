<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NotaVault - Alterar senha de acesso.">
  <meta name="theme-color" content="#0a0a0f">
  <title>NotaVault - Alterar Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%2333ddff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2L4 8v8c0 7.2 5.1 13.9 12 16 6.9-2.1 12-8.8 12-16V8L16 2z' fill='url(%23g)' opacity='0.9'/%3E%3Cpath d='M14 17l-3-3-1.5 1.5L14 20l7-7-1.5-1.5L14 17z' fill='%230a0a0f'/%3E%3C/svg%3E">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --border-color: rgba(255, 255, 255, 0.05);
      --border-hover: rgba(255, 255, 255, 0.1);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #00d4ff;
      --accent-green: #00ff88;
      --accent-orange: #ff6b35;
      --accent-red: #ff3366;
      --accent-purple: #a855f7;
      --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
      --glow-red: 0 0 20px rgba(255, 51, 102, 0.3);
      --glow-orange: 0 0 20px rgba(255, 107, 53, 0.3);
      --glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
      --radius: 12px;
      --radius-lg: 16px;
      --radius-sm: 8px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }

    ::selection {
      background: rgba(0, 212, 255, 0.2);
      color: var(--accent-cyan);
    }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: var(--transition);
    }

    a:hover {
      color: #33ddff;
      text-shadow: var(--glow-cyan);
    }

    input, button, textarea, select {
      font-family: inherit;
      font-size: inherit;
      outline: none;
      border: none;
      background: none;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
    }

    .glass-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
    }

    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .auth-layout::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    .auth-layout::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.08), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-brand-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-brand-icon svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.4));
    }

    .auth-brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), #33ddff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.35rem;
    }

    .auth-brand-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .warning-banner {
      background: rgba(255, 107, 53, 0.08);
      border: 1px solid rgba(255, 107, 53, 0.2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--accent-orange);
    }

    .warning-banner svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), var(--glow-cyan);
      background: rgba(255, 255, 255, 0.05);
    }

    .form-input:hover:not(:focus) {
      border-color: var(--border-hover);
    }

    .form-input.error {
      border-color: rgba(255, 51, 102, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 51, 102, 0.1);
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon .form-input {
      padding-right: 2.5rem;
    }

    .input-with-icon .input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .input-with-icon .input-icon:hover {
      color: var(--text-primary);
    }

    .input-with-icon .input-icon svg {
      width: 18px;
      height: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.875rem;
      letter-spacing: 0.025em;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.1));
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: var(--accent-cyan);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 212, 255, 0.15));
      box-shadow: var(--glow-cyan);
      border-color: rgba(0, 212, 255, 0.5);
    }

    .password-meter {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .password-meter-segment {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.05);
      transition: var(--transition);
      overflow: hidden;
    }

    .password-meter-segment.active {
      box-shadow: 0 0 6px currentColor;
    }

    .password-meter-label {
      font-size: 0.7rem;
      font-weight: 500;
      margin-top: 0.25rem;
      text-align: right;
      transition: var(--transition);
    }

    .password-requirements {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .password-requirement {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .password-requirement.met {
      color: var(--accent-green);
    }

    .password-requirement.unmet {
      color: var(--accent-red);
    }

    .password-requirement-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      font-size: 0.875rem;
      min-width: 320px;
      max-width: 440px;
      animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      overflow: hidden;
    }

    .toast::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: currentColor;
      animation: toastProgress 5s linear forwards;
    }

    .toast-success {
      background: rgba(0, 255, 136, 0.08);
      border-color: rgba(0, 255, 136, 0.2);
      color: var(--accent-green);
    }

    .toast-error {
      background: rgba(255, 51, 102, 0.08);
      border-color: rgba(255, 51, 102, 0.2);
      color: var(--accent-red);
    }

    .toast-info {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.2);
      color: var(--accent-cyan);
    }

    .toast-warning {
      background: rgba(255, 107, 53, 0.08);
      border-color: rgba(255, 107, 53, 0.2);
      color: var(--accent-orange);
    }

    .toast-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .toast-message {
      flex: 1;
    }

    .toast-close {
      flex-shrink: 0;
      cursor: pointer;
      opacity: 0.6;
      transition: var(--transition);
      padding: 0.25rem;
    }

    .toast-close:hover {
      opacity: 1;
    }

    .toast.removing {
      animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 212, 255, 0.2);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .w-full { width: 100% !important; }
    .mt-2 { margin-top: 1rem !important; }
    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOutRight {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(100px);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes toastProgress {
      from { width: 100%; }
      to { width: 0%; }
    }

    @media (max-width: 768px) {
      .auth-card {
        max-width: 100%;
      }

      .auth-layout {
        padding: 1rem;
      }

      .glass-card {
        padding: 1.5rem;
      }

      .toast {
        min-width: auto;
        max-width: calc(100vw - 2rem);
      }

      .toast-container {
        right: 0.75rem;
        top: 0.75rem;
        left: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card glass-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="shield-grad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#33ddff"/>
              </linearGradient>
              <linearGradient id="shield-inner" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#33ddff" stop-opacity="0.1"/>
              </linearGradient>
            </defs>
            <path d="M28 4L8 14v12c0 12.6 8.5 24.3 20 28 11.5-3.7 20-15.4 20-28V14L28 4z" fill="url(#shield-inner)" stroke="url(#shield-grad)" stroke-width="1.5"/>
            <path d="M28 12L14 18v8c0 8.4 5.6 16.2 14 18.6 8.4-2.4 14-10.2 14-18.6v-8L28 12z" fill="url(#shield-inner)" stroke="url(#shield-grad)" stroke-width="0.8" opacity="0.6"/>
            <path d="M24 30l-6-6 2.5-2.5L24 25l11.5-11.5L38 16 24 30z" fill="url(#shield-grad)"/>
          </svg>
        </div>
        <h1 class="auth-brand-title">NotaVault</h1>
        <p class="auth-brand-subtitle">Alterar Senha</p>
      </div>

      <div class="warning-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Você precisa alterar sua senha antes de continuar.</span>
      </div>

      <form id="change-password-form" method="POST" action="javascript:void(0)" autocomplete="off">
        <div class="input-group" id="current-password-group">
          <label class="form-label" for="current-password">Senha Atual</label>
          <div class="input-with-icon">
            <input type="password" id="current-password" name="current_password" class="form-input" placeholder="Digite sua senha atual" autocomplete="current-password">
            <span class="input-icon toggle-pw" role="button" tabindex="0" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <div class="input-group">
          <label class="form-label" for="new-password">Nova Senha</label>
          <div class="input-with-icon">
            <input type="password" id="new-password" name="new_password" class="form-input" placeholder="Crie uma nova senha forte" autocomplete="new-password" required>
            <span class="input-icon toggle-pw" role="button" tabindex="0" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="password-meter" id="password-meter">
            <div class="password-meter-segment" data-segment="0"></div>
            <div class="password-meter-segment" data-segment="1"></div>
            <div class="password-meter-segment" data-segment="2"></div>
            <div class="password-meter-segment" data-segment="3"></div>
          </div>
          <div class="password-meter-label" id="password-meter-label"></div>
        </div>

        <div class="password-requirements" id="password-requirements">
          <div class="password-requirement" data-check="length">
            <span class="password-requirement-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>
            </span>
            <span>12+ caracteres</span>
          </div>
          <div class="password-requirement" data-check="uppercase">
            <span class="password-requirement-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>
            </span>
            <span>Letra maiúscula</span>
          </div>
          <div class="password-requirement" data-check="lowercase">
            <span class="password-requirement-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>
            </span>
            <span>Letra minúscula</span>
          </div>
          <div class="password-requirement" data-check="digit">
            <span class="password-requirement-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>
            </span>
            <span>Número</span>
          </div>
          <div class="password-requirement" data-check="special">
            <span class="password-requirement-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>
            </span>
            <span>Caractere especial (!@#$%...)</span>
          </div>
        </div>

        <div class="input-group mt-2">
          <label class="form-label" for="confirm-new-password">Confirmar Nova Senha</label>
          <input type="password" id="confirm-new-password" name="confirm_password" class="form-input" placeholder="Repita a nova senha" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn btn-primary w-full mt-2" id="change-password-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Alterar Senha
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
